server:
  port: 8080

spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST:192.168.3.36}:${DB_PORT:5432}/${DB_NAME:agenthub}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: AgentHubHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.agenthub.infrastructure.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.agenthub: debug
    org.springframework: info

# 应用配置
agenthub:
  gateway:
    url: ${GATEWAY_URL:http://localhost:8080}
  llm:
    provider: ${LLM_PROVIDER:mock}
    model: ${LLM_MODEL:gpt-4}
    api-key: ${LLM_API_KEY:}
    api-url: ${LLM_API_URL:}
  oss:
    article-bucket: ${OSS_BUCKET:agenthub-articles}
    endpoint: ${OSS_ENDPOINT:}
    access-key: ${OSS_ACCESS_KEY:}
    secret-key: ${OSS_SECRET_KEY:}