version: '3.8'

services:
  # ==================== 基础设施 ====================

  # PostgreSQL 数据库
  postgres:
    image: postgres:14-alpine
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      TZ: Asia/Shanghai
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./agenthub-infrastructure/src/main/resources/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d agenthub"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agenthub-network

  # Nacos 配置中心和服务发现
  nacos:
    image: nacos/nacos-server:v2.2.0
    container_name: agenthub-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: embedded
      TZ: Asia/Shanghai
    ports:
      - "${NACOS_PORT:-8848}:8848"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - agenthub-network

  # MinIO 对象存储 (替代阿里云OSS)
  minio:
    image: minio/minio:latest
    container_name: agenthub-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${OSS_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_USER_PASSWORD: ${OSS_SECRET_KEY:-minioadmin}
      TZ: Asia/Shanghai
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agenthub-network

  # ==================== 应用服务 ====================

  # 后端服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenthub-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_healthy
    environment:
      # 数据库配置
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: agenthub
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      # Nacos配置
      NACOS_HOST: nacos
      NACOS_PORT: 8848
      # LLM配置
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_API_URL: ${LLM_API_URL:-}
      # OSS配置
      OSS_ENDPOINT: http://minio:9000
      OSS_ACCESS_KEY: ${OSS_ACCESS_KEY:-minioadmin}
      OSS_SECRET_KEY: ${OSS_SECRET_KEY:-minioadmin}
      OSS_BUCKET: ${OSS_BUCKET:-agenthub-articles}
      # 机器ID（雪花算法）
      MACHINE_ID: ${MACHINE_ID:-1}
      # JVM参数
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - agenthub-network

  # 前端服务
  frontend:
    image: nginx:alpine
    container_name: agenthub-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./agenthub-web/dist:/usr/share/nginx/html:ro
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - agenthub-network

# ==================== 网络 ====================
networks:
  agenthub-network:
    driver: bridge

# ==================== 数据卷 ====================
volumes:
  postgres_data:
  minio_data: